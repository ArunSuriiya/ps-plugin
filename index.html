<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        /* FINAL PRODUCTION LAYOUT */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            font-family: -apple-system, sans-serif;
            position: absolute;
            inset: 0;
        }

        #status-bar {
            background: #000;
            color: #0f0;
            padding: 5px 12px;
            font-size: 11px;
            border-bottom: 1px solid #333;
            height: 24px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        #header {
            background: #222;
            padding: 15px;
            border-bottom: 1px solid #444;
            height: 150px;
            /* Increased to fix overlap */
            box-sizing: border-box;
            position: absolute;
            top: 24px;
            left: 0;
            right: 0;
            z-index: 90;
        }

        .btn-save {
            background: #3a86ff;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        /* SCROLL AREA - PUSHED DOWN */
        #asset-grid {
            position: absolute;
            top: 174px;
            /* 24 + 150 */
            bottom: 0px;
            left: 0;
            right: 0;
            overflow-y: auto;
            padding: 15px;
            background: #111;
            box-sizing: border-box;
        }

        /* PREMIUM DARK MODE CARD */
        .list-item {
            background: #252525 !important;
            /* Forced Black Mode */
            color: #fff !important;
            margin-bottom: 12px;
            border: 1px solid #444;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 10px;
            position: relative;
            cursor: pointer;
        }

        .list-item:hover {
            background: #333;
        }

        .item-thumb {
            width: 50px;
            height: 50px;
            background: #000;
            margin-right: 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid #444;
            pointer-events: none;
        }

        .item-thumb img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .item-name {
            flex: 1;
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }

        .item-del-btn {
            background: #ff3b30;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="status-bar">• Library Ready</div>

    <div id="header">
        <div
            style="background:#000; border:1px solid #444; border-radius:4px; margin-bottom:4px; padding:2px 2px; display:flex; align-items:center;">

            <input type="text" id="search" placeholder="Search assets..."
                style="background:transparent; border:none; color:white; padding:8px 0; width:100%; outline:none; font-size:13px;">
        </div>
        <button id="save-btn" class="btn-save">+ SAVE SELECTION</button>
    </div>

    <div id="asset-grid">
        <!-- Content Restricted to Layout Height -->
    </div>

    <script src="storage.js"></script>
    <script src="ps-host.js"></script>
    <script src="main.js"></script>
</body>

</html>
